<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages has no server-side routing, so any deep URL 404s.
    // Encode the path into ?p= and redirect to the root so the SPA can restore it.
    // pathSegmentsToKeep=1 for project pages (github.io/repo-name/); use 0 for user pages.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' +
      encodeURIComponent(
        '/' + l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '&' + l.search.slice(1) : '')
      ) + l.hash
    );
  </script>
</head>
<body></body>
</html>
