<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirantis Docs IA Prototype</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore a path that was encoded into ?p= by 404.html.
      (function () {
        var search = window.location.search;
        if (search.startsWith('?p=')) {
          var decoded = decodeURIComponent(search.slice(3));
          var ampIndex = decoded.indexOf('&');
          var path = ampIndex === -1 ? decoded : decoded.slice(0, ampIndex);
          var query = ampIndex === -1 ? '' : '?' + decoded.slice(ampIndex + 1);
          var base = '%BASE_URL%'.replace(/\/$/, '');
          window.history.replaceState(null, null, base + path + query + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
